@if (currentUser$ | async; as user) {
  @if (isStudent(user)) {
    <app-student-dashboard [user]="user" />
  } @else {
    <div class="rounded-xl border border-dashed border-gray-300 bg-white p-8 text-center text-gray-600">
      <p class="font-medium text-skillnet-dark">Panel en construcción</p>
      <p class="mt-1 text-sm">El dashboard para tu rol estará disponible pronto.</p>
    </div>
  }
}
