<app-auth-navbar />

<section class="verify-shell">
  <div class="verify-card">
    <h1>Verifica tu correo</h1>
    <p class="lead">
      Te enviamos un código de 6 dígitos. Escríbelo aquí para activar tu cuenta y continuar.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="verify-form">
      <label>
        <span>Correo</span>
        <input type="email" formControlName="email" autocomplete="email" />
      </label>

      <label>
        <span>Código de verificación</span>
        <input
          type="text"
          formControlName="code"
          maxlength="6"
          inputmode="numeric"
          autocomplete="one-time-code"
          placeholder="000000"
        />
      </label>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }
      @if (info()) {
        <p class="info">{{ info() }}</p>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Verificando…' : 'Confirmar código' }}
      </button>

      <button type="button" class="btn-secondary" [disabled]="resending()" (click)="resend()">
        {{ resending() ? 'Reenviando…' : 'Reenviar código' }}
      </button>
    </form>

    <p class="foot">
      ¿Ya verificaste?
      <a routerLink="/login">Volver al login</a>
    </p>
  </div>
</section>
