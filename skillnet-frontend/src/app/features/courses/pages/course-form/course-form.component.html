<div class="mx-auto max-w-2xl">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-skillnet-dark">
      {{ isEditMode() ? 'Editar curso' : 'Nuevo curso' }}
    </h1>
    <p class="mt-1 text-sm text-gray-600">
      {{ isEditMode() ? 'Actualiza la información de tu curso' : 'Completa los datos para publicar tu curso' }}
    </p>
  </div>

  @if (error()) {
    <div class="mb-6 rounded-lg bg-red-100 px-4 py-3 text-sm text-red-800">{{ error() }}</div>
  }

  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="rounded-xl border border-gray-100 bg-white p-6 shadow-md sm:p-8"
  >
    <div class="flex flex-col gap-5">
      <div class="flex flex-col gap-1.5">
        <label for="title" class="text-sm font-semibold text-skillnet-dark">Título</label>
        <input
          id="title"
          type="text"
          formControlName="title"
          placeholder="Ej. Introducción a Angular"
          class="rounded-lg border border-gray-300 px-3.5 py-3 text-sm text-skillnet-dark outline-none focus:border-skillnet-accent"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="slug" class="text-sm font-semibold text-skillnet-dark">Slug (URL)</label>
        <input
          id="slug"
          type="text"
          formControlName="slug"
          placeholder="introduccion-angular"
          class="rounded-lg border border-gray-300 px-3.5 py-3 text-sm text-skillnet-dark outline-none focus:border-skillnet-accent"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="description" class="text-sm font-semibold text-skillnet-dark">Descripción</label>
        <textarea
          id="description"
          formControlName="description"
          rows="4"
          placeholder="Describe de qué trata el curso..."
          class="resize-y rounded-lg border border-gray-300 px-3.5 py-3 text-sm text-skillnet-dark outline-none focus:border-skillnet-accent"
        ></textarea>
      </div>

      <div class="grid gap-5 sm:grid-cols-2">
        <div class="flex flex-col gap-1.5">
          <label for="level" class="text-sm font-semibold text-skillnet-dark">Nivel</label>
          <select
            id="level"
            formControlName="level"
            class="rounded-lg border border-gray-300 bg-white px-3.5 py-3 text-sm text-skillnet-dark outline-none focus:border-skillnet-accent"
          >
            @for (opt of levelOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="status" class="text-sm font-semibold text-skillnet-dark">Estado</label>
          <select
            id="status"
            formControlName="status"
            class="rounded-lg border border-gray-300 bg-white px-3.5 py-3 text-sm text-skillnet-dark outline-none focus:border-skillnet-accent"
          >
            @for (opt of statusOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="price" class="text-sm font-semibold text-skillnet-dark">Precio (USD)</label>
        <input
          id="price"
          type="number"
          formControlName="price"
          min="0.01"
          step="0.01"
          class="rounded-lg border border-gray-300 px-3.5 py-3 text-sm text-skillnet-dark outline-none focus:border-skillnet-accent"
        />
      </div>
    </div>

    <div class="mt-8 flex gap-3">
      <button
        type="button"
        (click)="cancel()"
        class="flex-1 rounded-lg border border-gray-300 px-4 py-3 text-sm font-semibold text-gray-700 transition-colors hover:bg-gray-50"
      >
        Cancelar
      </button>
      <button
        type="submit"
        [disabled]="isLoading()"
        class="flex-1 rounded-lg bg-skillnet-accent px-4 py-3 text-sm font-semibold text-white transition-opacity hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ isLoading() ? 'Guardando...' : isEditMode() ? 'Actualizar' : 'Guardar curso' }}
      </button>
    </div>
  </form>
</div>
