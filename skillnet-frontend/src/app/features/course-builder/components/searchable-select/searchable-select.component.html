<div class="relative w-full max-w-xl" #dropdown>
  <div class="relative">
    <input
      type="text"
      [ngModel]="searchTerm()"
      (ngModelChange)="onSearchChange($event)"
      (focus)="isOpen.set(true)"
      [placeholder]="placeholder()"
      class="w-full rounded-2xl border border-gray-200 bg-white px-6 py-2 text-lg text-skillnet-dark shadow-sm placeholder:text-gray-300 focus:border-skillnet-accent focus:outline-none focus:ring-4 focus:ring-skillnet-accent/10"
    />
    <button
      type="button"
      (mousedown)="$event.preventDefault(); toggleOpen()"
      class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-400"
      [attr.aria-label]="'Abrir ' + label()"
    >
      <i class="text-xl" [class]="isOpen() ? 'ri-arrow-up-s-line' : 'ri-arrow-down-s-line'"></i>
    </button>
  </div>

  @if (isOpen() && filteredOptions().length > 0) {
    <ul
      class="absolute z-20 mt-2 max-h-64 w-full overflow-auto rounded-xl border border-gray-100 bg-white py-2 shadow-lg"
    >
      @for (option of filteredOptions(); track option) {
        <li>
          <button
            type="button"
            (mousedown)="$event.preventDefault(); selectOption(option)"
            class="w-full px-4 py-2 text-left text-sm hover:bg-skillnet-surface"
            [class.bg-skillnet-accent/10]="selected() === option"
            [class.font-semibold]="selected() === option"
          >
            {{ option }}
          </button>
        </li>
      }
    </ul>
  }
</div>
