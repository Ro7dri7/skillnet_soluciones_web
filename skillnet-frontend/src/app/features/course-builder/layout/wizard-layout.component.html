<div class="flex min-h-0 flex-1 flex-col">

    <app-course-builder-toolbar
      class="shrink-0"
      [stepLabel]="currentStepLabel()"
      [progressPercent]="progressPercent()"
      [backRoute]="previousRoute()"
    />

  <div class="min-h-0 flex-1 overflow-y-auto">
    <router-outlet />
  </div>
</div>
