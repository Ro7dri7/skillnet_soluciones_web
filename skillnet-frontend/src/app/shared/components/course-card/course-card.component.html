<article
  role="button"
  tabindex="0"
  (click)="onCardClick()"
  (keydown.enter)="onCardClick()"
  class="flex h-full w-full cursor-pointer flex-col overflow-hidden rounded-xl bg-white shadow-sm transition-all hover:shadow-lg"
>
  <div class="relative aspect-video w-full overflow-hidden bg-skillnet-dark/5">
    @if (imageUrl(); as src) {
      <img [src]="src" [alt]="title()" class="h-full w-full object-cover" />
    } @else {
      <div
        class="flex h-full w-full items-center justify-center bg-gradient-to-br from-skillnet-dark to-skillnet-accent"
      >
        <i class="ri-book-open-line text-4xl text-white/80"></i>
      </div>
    }
    @if (category(); as cat) {
      <span
        class="absolute left-3 top-3 rounded-md bg-skillnet-dark px-2 py-1 text-xs font-semibold text-white"
      >
        {{ cat }}
      </span>
    }
  </div>

  <div class="flex flex-1 flex-col p-4">
    <h3 class="mb-2 line-clamp-2 min-h-[2.75rem] text-base font-bold leading-snug text-skillnet-dark">
      {{ title() }}
    </h3>

    <p class="mb-4 text-xl font-bold text-skillnet-accent">
      {{ price() | currency: 'USD' : 'symbol' : '1.0-0' }}
    </p>

    <button
      type="button"
      (click)="onBuyClick($event)"
      class="mt-auto w-full rounded-lg bg-skillnet-accent px-4 py-2.5 text-sm font-semibold text-white transition-opacity hover:opacity-90"
    >
      Comprar ahora
    </button>
  </div>
</article>
