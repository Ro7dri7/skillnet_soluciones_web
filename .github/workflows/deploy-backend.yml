# GitOps: compila y despliega el backend SkillNet en EC2 cuando cambia backend/ en main.
name: Deploy Backend (EC2)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: skillnet-backend-prod
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build JAR & deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify JAR artifact
        run: test -f target/skillnet-backend-0.0.1-SNAPSHOT.jar

      - name: Upload JAR to EC2 (/tmp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: backend/target/skillnet-backend-0.0.1-SNAPSHOT.jar
          target: /tmp
          strip_components: 2
          overwrite: true

      - name: Install JAR and restart skillnet.service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            sudo mkdir -p /opt/skillnet
            sudo mv /tmp/skillnet-backend-0.0.1-SNAPSHOT.jar /opt/skillnet/backend.jar
            sudo chown ubuntu:ubuntu /opt/skillnet/backend.jar
            sudo chmod 644 /opt/skillnet/backend.jar
            sudo systemctl daemon-reload
            sudo systemctl restart skillnet
            sudo systemctl is-active --quiet skillnet
            sudo systemctl status skillnet --no-pager -l | head -n 20
